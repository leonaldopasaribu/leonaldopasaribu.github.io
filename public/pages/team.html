<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="theme-color" content="#26A69A" />

  <title>Laliga Santander</title>

  <link rel="apple-touch-icon" href="../assets/img/icons/icon-192x192.png">
  <link rel="shortcut icon" href="../assets/img/icons/icon-72x72.png" type="image/x-icon">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/materialize.min.css">
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <header>
    <div class="navbar-fixed">
      <nav>
        <div class="nav-wrapper container">
          <a href="../index.html" class="brand-logo"><b>Laliga Spanyol</b></a>
          <a href="#" data-target="mobile-nav" class="sidenav-trigger">☰</a>

          <ul class="topnav right hide-on-med-and-down"></ul>
        </div>
      </nav>
    </div>

    <!-- mobile nav -->
    <ul id="mobile-nav" class="sidenav">
      <li>
        <ul class="mobilenav">
        </ul>
      </li>
    </ul>
  </header>

  <div class="container" id="body-content">
    <div class="center-align" id="loader"></div>

    <div class="row">
      <div id="detailTeam"></div>
      <div class="center-align">
        <a href="#" id="addFavorite">
          <img src="/assets/img/star.png" class="img-favorite responsive-img">
        </a>
      </div>
    </div>

    <div class="row">
      <div class="col s6" id="matches"></div>
      <div class="col s6" id="players"></div>
    </div>
  </div>

  <script src="/js/materialize.min.js"></script>
  <script src="/js/date.js"></script>
  <script src="/js/idb.js"></script>
  <script src="/js/favorite.js"></script>
  <script src="/js/api.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      var item = getTeam();
      getMatch();

      var addFavorite = document.getElementById("addFavorite");
      addFavorite.onclick = () => {
        item.then(article => {
          addFavoriteTeam(article);
        })
      }
    });
  </script>
</body>

</html>
